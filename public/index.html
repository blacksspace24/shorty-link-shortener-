<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ShortLink — Free URL Shortener</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  /* Optional: pixelated cursor (requires an image) */
  /* body { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><polygon points="2,2 14,2 14,14 2,14" fill="none" stroke="lime" stroke-width="2"/></svg>'), auto; } */
</style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-container">
      <div class="logo">
        <a href="/">🔗 <span>Shorty</span></a>
      </div>
      <div class="social-links">
        <a href="https://t.me/yourusername" target="_blank" rel="noopener noreferrer" title="Telegram">
          <i class="fab fa-telegram-plane"></i>
        </a>
        <a href="https://discord.gg/yourinvite" target="_blank" rel="noopener noreferrer" title="Discord">
          <i class="fab fa-discord"></i>
        </a>
        <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer" title="GitHub">
          <i class="fab fa-github"></i>
        </a>
      </div>
    </div>
  </nav>

  <div class="container">
    <header>
      <h1>🔗 <span>Shorty</span></h1>
      <p>Create short, memorable links in seconds</p>
    </header>

    <div class="card">
      <form id="shortenForm">
        <div class="input-group">
          <input 
            type="url" 
            id="longUrl" 
            placeholder="https://example.com/very/long/url/to/shorten" 
            required
            autocomplete="off"
          >
          <button type="submit">Shorten ✨</button>
        </div>
      </form>

      <div id="result" class="result hidden">
        <div class="result-header">
          <span>✨ Your short link</span>
          <button id="copyBtn" class="copy-btn">Copy</button>
        </div>
        <div class="short-link-container">
          <a id="shortLink" href="#" target="_blank" class="short-link"></a>
        </div>
        <div class="stats">
          <span id="clickStats" class="click-badge"></span>
        </div>
      </div>
    </div>

    <div class="recent-section">
  <div class="section-header">
  <h2>📊 Recent Links</h2>
  <div class="header-right">
    <span class="badge">Live clicks</span>
    <button id="clearHistoryBtn" class="clear-btn">🗑️ CLEAR</button>
  </div>
</div>
  <div id="recentList" class="recent-list">
    <div class="loading">Loading your links...</div>
  </div>
</div>

    <footer>
      <p>Simple, fast, and free URL shortener. No tracking, no ads.</p>
      <p>Copyright © zahen - 2026</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
